<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FORGE — Human Performance OS · Interactive Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050608; --bg2:#0d1015; --card:#131722; --card2:#1b2029;
  --gold:#d4af37; --gold-b:#f5dc7a; --gold-d:#a07f1f;
  --cream:#f4ecd8; --cream-d:#cfc4a8; --muted:#8b93a8; --faint:#5a6275;
  --green:#5dd39e; --ruby:#9b2a3f; --ruby-b:#c25f74; --amber:#e9b949; --royal:#6b8fcc;
  --hair:rgba(212,175,55,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{background:
  radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,175,55,.08), transparent 60%),
  radial-gradient(ellipse 60% 40% at 15% 100%, rgba(155,42,63,.05), transparent 50%),
  var(--bg);
  color:var(--cream); font-family:Inter,system-ui,sans-serif; min-height:100vh;
  -webkit-font-smoothing:antialiased}
::selection{background:rgba(212,175,55,.4);color:#fff}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(212,175,55,.18);border-radius:4px}
.display{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;letter-spacing:-.01em}
#app{display:flex;min-height:100vh}

/* sidebar */
#sidebar{position:fixed;inset:0 auto 0 0;width:240px;background:linear-gradient(180deg,rgba(10,12,16,.97),rgba(5,6,8,.97));
  border-right:1px solid var(--hair);overflow-y:auto;z-index:40;padding:20px 12px 20px}
.logo{display:flex;align-items:center;gap:10px;padding:0 10px 16px}
.logo-mark{width:32px;height:36px;display:grid;place-items:center;
  background:linear-gradient(135deg,#f5dc7a,#d4af37 55%,#a07f1f);
  clip-path:polygon(50% 0,100% 18%,100% 60%,50% 100%,0 60%,0 18%);
  color:#0a0c10;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;
  box-shadow:0 0 18px rgba(212,175,55,.45)}
.logo span{font-family:'Cormorant Garamond',serif;letter-spacing:.4em;font-size:15px;font-weight:600;color:var(--cream)}
.nav-sec{margin:14px 0 4px;padding:0 10px;font-size:9px;letter-spacing:.22em;color:rgba(233,198,89,.7);text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;
  color:var(--cream-d);font-size:12.5px;transition:.15s}
.nav-item:hover{background:rgba(31,36,48,.5);color:var(--cream)}
.nav-item.on{background:rgba(212,175,55,.09);color:#e9c659}
.nav-item .ic{width:16px;text-align:center;color:var(--faint)}
.nav-item.on .ic{color:var(--gold)}
.side-user{margin-top:18px;padding:12px 10px;border-top:1px solid var(--hair);display:flex;gap:10px;align-items:center}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#f5dc7a,#a07f1f);
  display:grid;place-items:center;color:#0a0c10;font-weight:700;font-size:12px}

/* main */
#main{flex:1;margin-left:240px;padding:0 26px 110px}
#topbar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;background:rgba(5,6,8,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair);margin-bottom:20px}
.tb-date{font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.tb-name{font-family:'Cormorant Garamond',serif;font-size:18px}
.tb-name b{background:linear-gradient(135deg,#f5dc7a,#d4af37,#a07f1f);-webkit-background-clip:text;background-clip:text;color:transparent}
.tb-right{display:flex;gap:10px;align-items:center}
.demo-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  border:1px solid rgba(212,175,55,.35);border-radius:999px;padding:5px 12px;background:rgba(212,175,55,.06)}

/* dock (mobile) */
#dock{display:none;position:fixed;inset:auto 0 0 0;z-index:50;background:rgba(10,12,16,.92);backdrop-filter:blur(18px);
  border-top:1px solid var(--hair);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
#dock .d{flex:1;text-align:center;cursor:pointer;color:var(--faint);font-size:9px;text-transform:uppercase;letter-spacing:.08em}
#dock .d .di{font-size:18px;display:block;margin-bottom:2px}
#dock .d.on{color:#e9c659}
#dock .d.coach .di{color:var(--gold);text-shadow:0 0 12px rgba(212,175,55,.8)}

/* primitives */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{border-radius:15px;border:1px solid var(--hair);padding:16px;
  background:linear-gradient(180deg,rgba(27,32,41,.8),rgba(19,23,34,.65))}
.card.gold{border-color:rgba(212,175,55,.3);background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(19,23,34,.65));
  box-shadow:0 0 30px rgba(212,175,55,.07)}
.eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#e9c659;font-weight:600}
h1.t{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;margin:3px 0 2px}
.sub{font-size:12.5px;color:var(--muted);max-width:640px}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:9px;
  font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--hair);color:var(--cream-d);background:rgba(212,175,55,.04)}
.chip.gold{border-color:rgba(212,175,55,.4);color:#e9c659;background:rgba(212,175,55,.08)}
.chip.green{border-color:rgba(93,211,158,.35);color:var(--green);background:rgba(93,211,158,.06)}
.chip.amber{border-color:rgba(233,185,73,.4);color:var(--amber);background:rgba(233,185,73,.07)}
.chip.ruby{border-color:rgba(155,42,63,.45);color:var(--ruby-b);background:rgba(155,42,63,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:999px;cursor:pointer;border:0;
  padding:10px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:Inter;
  background:linear-gradient(180deg,#d4af37,#a07f1f);color:#0a0c10;box-shadow:0 0 20px rgba(212,175,55,.25);transition:.15s}
.btn:hover{filter:brightness(1.12)}
.btn.ghost{background:transparent;color:var(--cream);border:1px solid rgba(212,175,55,.3);box-shadow:none}
.btn.ghost:hover{border-color:rgba(212,175,55,.6);color:#e9c659}
.bar{height:7px;border-radius:99px;background:rgba(212,175,55,.07);overflow:hidden;position:relative}
.bar i{position:absolute;inset:0 auto 0 0;border-radius:99px;transition:width .6s ease}
.bar-row{margin-bottom:10px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.bar-lbl b{color:var(--cream-d);font-weight:500}.bar-lbl span{color:var(--muted)}
.note{display:flex;gap:8px;border-radius:10px;border:1px solid rgba(212,175,55,.2);background:rgba(212,175,55,.05);
  padding:11px;font-size:11.5px;color:var(--cream-d);line-height:1.5}
.note:before{content:"✦";color:var(--gold)}
.disc{border-radius:10px;border:1px solid var(--hair);background:rgba(19,23,34,.5);padding:11px;font-size:10px;color:var(--faint);line-height:1.5}
.rowi{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(212,175,55,.06);font-size:12px}
.rowi span{color:var(--muted)}.rowi b{color:var(--cream);font-weight:500}
.statn{font-family:'Cormorant Garamond',serif;font-feature-settings:"tnum"}
.gtxt{background:linear-gradient(135deg,#f5dc7a,#d4af37 60%,#a07f1f);-webkit-background-clip:text;background-clip:text;color:transparent}
.tile{border-radius:13px;border:1px solid var(--hair);background:linear-gradient(180deg,rgba(27,32,41,.8),rgba(19,23,34,.6));
  padding:14px;cursor:pointer;transition:.18s}
.tile:hover{border-color:rgba(212,175,55,.35);box-shadow:0 0 24px rgba(212,175,55,.08)}
.pill{display:inline-block;border-radius:999px;border:1px solid var(--hair);padding:6px 13px;font-size:11.5px;
  color:var(--cream-d);cursor:pointer;margin:0 6px 6px 0;transition:.15s;background:rgba(19,23,34,.6)}
.pill:hover{border-color:rgba(212,175,55,.4)}
.pill.on{border-color:rgba(212,175,55,.55);background:rgba(212,175,55,.12);color:#f5dc7a;font-weight:600}
.fade{animation:rise .45s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulseg{0%,100%{opacity:.55}50%{opacity:1}}
.pulse{animation:pulseg 2.6s ease-in-out infinite}

/* coach chat */
.chat{display:flex;flex-direction:column;height:560px;border-radius:15px;border:1px solid var(--hair);overflow:hidden;background:rgba(13,16,21,.6)}
.chat-log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.msg-u{align-self:flex-end;max-width:75%;background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);
  border-radius:15px 15px 4px 15px;padding:10px 14px;font-size:13px}
.msg-c{align-self:flex-start;max-width:88%}
.msg-c .body{background:var(--card);border:1px solid var(--hair);border-radius:15px 15px 15px 4px;padding:12px 14px;font-size:13px;line-height:1.55;color:var(--cream-d)}
.msg-c .body:before{content:"✦ ";color:var(--gold)}
.steps{margin-top:8px;border:1px solid var(--hair);border-radius:10px;background:rgba(13,16,21,.7);padding:10px;font-size:11px;color:var(--muted)}
.steps b{color:var(--gold);font-size:9px;letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:5px}
.ccards{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.ccard{flex:1;min-width:110px;border-radius:9px;padding:8px 10px;font-size:11px;border:1px solid}
.ccard small{display:block;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.sugg{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sugg span{border:1px solid rgba(212,175,55,.25);border-radius:999px;padding:4px 11px;font-size:10.5px;color:var(--cream-d);cursor:pointer}
.sugg span:hover{border-color:rgba(212,175,55,.6);color:#f5dc7a}
.chat-in{display:flex;gap:8px;padding:12px;border-top:1px solid var(--hair);background:rgba(10,12,16,.8)}
.chat-in input{flex:1;background:rgba(5,6,8,.7);border:1px solid var(--hair);border-radius:999px;padding:10px 16px;
  color:var(--cream);font-size:13px;font-family:Inter;outline:none}
.chat-in input:focus{border-color:rgba(212,175,55,.5)}
.thinking{font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}

.lb-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:9px;font-size:12.5px}
.lb-row.me{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.35)}
.rank{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;
  background:var(--card2);color:var(--muted)}
.rank.top{background:linear-gradient(135deg,#f5dc7a,#a07f1f);color:#0a0c10}
.sleepbar{display:flex;height:34px;border-radius:8px;overflow:hidden;gap:2px}
.badge-c{text-align:center;padding:12px 6px;border-radius:12px;border:1px solid var(--hair);background:rgba(19,23,34,.5)}
.badge-c.earned{border-color:rgba(212,175,55,.35);background:rgba(212,175,55,.05)}
.badge-i{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;margin:0 auto 7px;font-size:17px;
  background:var(--card2);color:var(--faint)}
.badge-c.earned .badge-i{background:linear-gradient(135deg,#f5dc7a,#a07f1f);color:#0a0c10;box-shadow:0 0 16px rgba(212,175,55,.35)}
.check{width:22px;height:22px;border-radius:50%;border:1px solid var(--faint);display:grid;place-items:center;cursor:pointer;font-size:12px;color:transparent;flex:none}
.check.on{background:rgba(93,211,158,.15);border-color:var(--green);color:var(--green)}
.seg{display:inline-flex;border:1px solid var(--hair);border-radius:999px;overflow:hidden;margin-bottom:14px}
.seg div{padding:7px 18px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--muted)}
.seg div.on{background:rgba(212,175,55,.14);color:#f5dc7a;font-weight:600}

@media(max-width:980px){
  #sidebar{display:none}
  #main{margin-left:0;padding:0 14px 110px}
  #dock{display:flex}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr}}
</style>

/* ---------- svg helpers ---------- */
function ring(v,size,tone,label,sub){
  const r=(size-12)/2, c=2*Math.PI*r, dash=Math.max(0,Math.min(100,v))/100*c;
  const col=tone==="green"?"#5dd39e":tone==="ruby"?"#c25f74":tone==="royal"?"#6b8fcc":"#d4af37";
  return `<svg width="${size}" height="${size}" style="display:block">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="rgba(212,175,55,.08)" stroke-width="9" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${col}" stroke-width="9" fill="none" stroke-linecap="round"
      stroke-dasharray="${dash} ${c}" transform="rotate(-90 ${size/2} ${size/2})" style="filter:drop-shadow(0 0 6px ${col}66)"/>
    <text x="50%" y="${label?"47%":"54%"}" text-anchor="middle" fill="${col}" font-family="Cormorant Garamond,serif" font-size="${size*.27}">${v}</text>
    ${label?`<text x="50%" y="62%" text-anchor="middle" fill="#8b93a8" font-size="${Math.max(8,size*.07)}" letter-spacing="2" font-family="Inter">${label.toUpperCase()}</text>`:""}
    ${sub?`<text x="50%" y="72%" text-anchor="middle" fill="#5a6275" font-size="${Math.max(7,size*.06)}" font-family="Inter">${sub}</text>`:""}
  </svg>`;
}
function spark(vals,w=240,h=44,col="#d4af37"){
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1,step=w/(vals.length-1);
  const pts=vals.map((v,i)=>[i*step, h-((v-mn)/rg)*(h-6)-3]);
  const line=pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const id="g"+Math.random().toString(36).slice(2,7);
  return `<svg width="${w}" height="${h}" style="max-width:100%"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity=".25"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${line} L${w},${h} L0,${h} Z" fill="url(#${id})"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="2.5" fill="${col}"/></svg>`;
}
function hbar(val,max,tone="gold",h=7){
  const col=tone==="green"?"#5dd39e":tone==="ruby"?"#c25f74":tone==="amber"?"#e9b949":tone==="royal"?"#6b8fcc":"#d4af37";
  const pct=Math.max(2,Math.min(100,val/max*100));
  return `<div class="bar" style="height:${h}px"><i style="width:${pct}%;background:linear-gradient(90deg,${col},${col}88);box-shadow:0 0 8px ${col}55"></i></div>`;
}
function barRow(lbl,right,val,max,tone){
  return `<div class="bar-row"><div class="bar-lbl"><b>${lbl}</b><span>${right}</span></div>${hbar(val,max,tone)}</div>`;
}
function head(eyebrow,title,sub){
  return `<div style="margin-bottom:16px"><div class="eyebrow">${eyebrow}</div><h1 class="t">${title}</h1>${sub?`<div class="sub">${sub}</div>`:""}</div>`;
}

function coachReply(q){
  q=q.toLowerCase();
  const M=(t,steps,cards,sg)=>({r:"c",t,steps,cards,sg});
  if(q.includes("do today")) return M("Three calls today, in order. (1) Upper push session as written — recovery is 78, the progression to 185 on bench is on. (2) Knee rehab block after lifting: Spanish squats and TKEs, ~12 minutes. (3) You're 72 g short on protein pace — make dinner protein-first and you land on target.",
    ["Recovery 78 → green light for upper intensity","Knee phase 2 → isometrics + slow tempo, no jumps","Protein pace 128 g vs 200 g target","Sleep debt 3.1 h → lights out 22:30"],
    [["Train","Upper Push · bench 185","green"],["Rehab","Knee block · 12 min","amber"],["Fuel","+72 g protein","gold"]],
    ["Should I train hard?","What should I eat?","How is my knee tracking?"]);
  if(q.includes("tired")||q.includes("fatigue")) return M("Stacked, in order of weight: 3.1 hours of sleep debt this week, HRV 6% under baseline (58 vs 62), and magnesium at 52% of target for 6 days — low Mg reliably degrades both of the first two. Fix tonight: Mg-glycinate 400 mg, lights out 22:30, and tomorrow reads differently.",
    ["Sleep: 5 of 7 nights under 8 h","HRV 58 ms vs 62 baseline","Magnesium 52% of target, 6 days running","Strain 14.2 yesterday — moderate, not the culprit"],
    [["Tonight","Mg 400 mg + 22:30","gold"],["Tomorrow","Re-check HRV","green"]],
    ["What supplement am I missing?","Should I take a rest day?"]);
  if(q.includes("train hard")||q.includes("push")) return M("Upper body: yes — recovery 78, readiness high, take the bench to 185. Lower body: capped. The knee is phase 2 of 4, so heavy slow resistance only — leg press at 3-0-3 tempo, no jumps, no skating sprints. Loading the tendon correctly this week is what gets you cleared next week.",
    ["Recovery 78 / readiness High","HRV −6% — fine for strength","Knee phase 2 → tempo yes, plyo no","ACR 1.24 → hold weekly volume flat"],
    [["Upper","Full send · RPE ≤ 9","green"],["Lower","Tempo only","amber"],["Avoid","Jumps · sprints","ruby"]],
    ["Generate today's workout","Why is my bench not increasing?"]);
  if(q.includes("eat")||q.includes("food")||q.includes("meal")) return M("You have 1,050 kcal and 72 g protein left against the lean-bulk targets. Tonight: 8 oz chicken or steak, 1.5 cups rice, vegetables, plus the casein bowl before bed — ~1,000 kcal and 75 g protein, done. You're also at 62% hydration; electrolytes in the next bottle since you skate tomorrow.",
    ["Consumed 2,150 / 3,200 kcal","Protein 128 / 200 g","Water 74 / 120 oz","Surplus target +280 kcal"],
    [["Remaining","1,050 kcal","gold"],["Protein left","72 g","amber"],["Hydration","62%","amber"]],
    ["What supplement am I missing?","Why am I tired?"]);
  if(q.includes("bench")) return M("Your bench has stalled at 180 for three weeks, and the data points at recovery, not programming. Top sets ran RPE 9+ four sessions straight, and you average 6.9 h sleep on bench days. The fix: two weeks at RPE 8 cap (175×5), add a paused back-off set, sleep 8 h before pressing. Then we test 185 — the forecast says 225 lands in November if we protect the slope.",
    ["Top-set RPE trend: 9, 9, 9.5, 9","Sleep on bench days: 6.9 h avg","Chest volume 13 sets/wk — already optimal","Est. 1RM 207 — strength is there, expression isn't"],
    [["Next 2 weeks","175×5 @ RPE 8","gold"],["Add","Paused bench 3×5","green"],["Test","185×5 · June 24","green"]],
    ["Show my forecast","Should I train hard?"]);
  if(q.includes("knee")||q.includes("injur")||q.includes("pain")) return M("The knee is tracking well — pain down from 5/10 to 2/10 over 12 days. You're in phase 2 (heavy slow resistance): Spanish squat isometrics daily, leg press 3-0-3 three times a week, no jumping or skating sprints yet. Phase 3 unlocks when hops are pain-free with no morning flare — realistically 7–10 days. If pain spikes above 5 or it swells, stop and see a physio; that's not a Forge call to make.",
    ["Patellar tendinopathy · day 12 · phase 2/4","Pain trend 5 → 2 over 12 days","Strength 74% of healthy side","RTS checklist: 3 of 6 cleared"],
    [["Daily","Spanish squat 5×45s","gold"],["Avoid","Plyo · sprints","ruby"],["Phase 3","7–10 days","green"]],
    ["Open my rehab plan","Can I still squat?"]);
  if(q.includes("supplement")||q.includes("missing")||q.includes("vitamin")) return M("Two real gaps. Magnesium — 52% of target for 6 days, and it lines up with your shallower sleep and HRV dip; 400 mg glycinate before bed. Omega-3 — 34% of target, and EPA/DHA matters extra for the knee tendon right now. Vitamin D is low on bloodwork too (26 ng/mL) — keep D3+K2 through indoor season. Creatine and whey are dialed: 23-day streak, don't touch them.",
    ["Mg 218/420 mg — 6 days low","Omega-3 0.8/2.5 g — 9 days low","Vit D bloodwork 26 ng/mL (optimal 50–70)","Creatine 100% — 23-day streak"],
    [["Add tonight","Mg-glycinate 400 mg","gold"],["Add daily","Fish oil 2 g","gold"],["Keep","Creatine · whey · D3","green"]],
    ["Why am I tired?","Show my deficiencies"]);
  return M("I'm reading your full picture — training, recovery, sleep, fuel, the knee, your goals. Ask about today, fatigue, the bench plateau, your knee, or your stack.",null,null,
    ["What should I do today?","Why am I tired?","Should I train hard?","Why is my bench not increasing?","How do I recover from knee pain?","What supplement am I missing?"]);
}

        return `<div class="ccard" style="border-color:${col}55;background:${col}11"><small>${c[0]}</small><b style="color:${col}">${c[1]}</b></div>`}).join("")}</div>`:""}
      ${m.sg?`<div class="sugg">${m.sg.map(s=>`<span onclick="sendChat('${s.replace(/'/g,"\\'")}')">${s}</span>`).join("")}</div>`:""}</div>`).join("")
    +(S.thinking?`<div class="thinking pulse">✦ coach is thinking…</div>`:"");
  el.scrollTop=el.scrollHeight;
}
function sendChat(q){
  q=(q||"").trim(); if(!q||S.thinking) return;
  const inp=document.getElementById("cin"); if(inp) inp.value="";
  S.chat.push({r:"u",t:q}); S.thinking=true; renderChat();
  setTimeout(()=>{S.thinking=false; S.chat.push(coachReply(q)); renderChat();},750);
}

/* ---------- interactions ---------- */
function toggleSupp(i){const s=S.supps[i]; s.on=!s.on; s.streak+=s.on?1:-1; render();}
function genPick(group,val){
  if(group==="inj"){const a=S.gen.inj; a.includes(val)?a.splice(a.indexOf(val),1):a.push(val);}
  else S.gen[group]=val;
  render();
}
function generate(){
  S.genOut="thinking"; render();
  setTimeout(()=>{
    const g=S.gen, knee=g.inj.includes("Knee"), sh=g.inj.includes("Shoulder"), bk=g.inj.includes("Back");
    const rec=78, sets=rec<60?3:rec>=80?5:4, cap=rec<60?"RPE 7":rec>=80?"RPE 9":"RPE 8.5";
    let why=[`Recovery ${rec}: standard volume, top sets capped at ${cap}.`];
    if(knee) why.push("Knee flag: squats, lunges and leg press swapped for hip-dominant + tempo work; zero plyometrics.");
    if(sh) why.push("Shoulder flag: overhead pressing removed — landmine and neutral-grip variants.");
    if(bk) why.push("Back flag: deadlifts, RDLs and bent-over rows removed — chest-supported pulling only.");
    const items=[
      sh?["Flat DB Press (neutral grip)",`${sets} × 8 · ${cap} · rest 2:30`]:["Barbell Bench Press",`${sets} × 5 @ 175–185 lb · ${cap} · rest 3:00`],
      bk?["Chest-Supported Row",`${sets} × 10 · ${cap} · rest 2:00`]:["Barbell Row",`${sets} × 8 @ 155 lb · ${cap} · rest 2:00`],
      knee?["Barbell Hip Thrust","3 × 8 @ 225 lb · RPE 8 · rest 2:00"]:["Back Squat",`${sets} × 5 @ 205–230 lb · ${cap} · rest 3:00`],
      knee?["Leg Press · 3-0-3 tempo","3 × 10 @ 60% · pain ≤ 2 rule"]:["Walking Lunge","3 × 10/leg @ 50 lb DBs"],
      ["Lateral Raise + Pushdown superset","3 × 12–15 · RPE 9 · rest 1:00"]];
    S.genOut=`<div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
      <span class="display" style="font-size:19px">${g.goal} · ${knee?"Knee-Safe":"Standard"} Build</span>
      <span><span class="chip gold">${g.time}</span> <span class="chip">${g.eq}</span></span></div>
      <div class="note" style="margin-bottom:10px">${why.join(" ")}</div>
      ${items.map((e,i)=>`<div class="rowi"><b>${i+1}. ${e[0]}</b><span>${e[1]}</span></div>`).join("")}
      <button class="btn" style="margin-top:12px" onclick="toast('Session loaded into the logger (native app)')">Use this session</button>`;
    render();
  },900);
}
function analyzeForm(){ if(S.form==="busy")return; S.form="busy"; render(); setTimeout(()=>{S.form=true; render();},1400);}
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";
    t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:99;background:rgba(19,23,34,.95);border:1px solid rgba(212,175,55,.4);color:#f4ecd8;padding:11px 18px;border-radius:12px;font-size:12px;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:opacity .3s";
    document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity=1;
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.opacity=0,2600);
}

/* ---------- nav / render ---------- */
const NAV=[["Daily",[["dashboard","◆","Dashboard"],["coach","✦","AI Coach"],["notifs","◷","Notifications"]]],
  ["Train",[["train","▲","Workouts"],["exercises","❒","Exercises"],["generator","✺","AI Generator"],["form","◬","Form Analysis"]]],
  ["Fuel",[["nutrition","◉","Nutrition"],["defs","▼","Deficiencies"],["supps","❖","Supplements"]]],
  ["Recover",[["recovery","☾","Recovery & Sleep"],["wearables","◐","Wearables"],["injury","✚","Forge Recovery"]]],
  ["Health",[["blood","❤","Bloodwork"],["body","◧","Body Tracking"],["forecast","✧","Digital Twin"]]],
  ["Community",[["social","❉","Social"],["compete","♔","Compete"],["achieve","★","Achievements"]]],
  ["Market",[["market","❀","Marketplace"],["teams","◈","Forge Teams"]]]];
const DOCK=[["dashboard","◆","Home"],["train","▲","Train"],["coach","✦","Coach"],["nutrition","◉","Fuel"],["recovery","☾","Recover"]];

function go(s){S.screen=s; render(); window.scrollTo({top:0});}
function render(){
  document.getElementById("sidebar").innerHTML=
    `<div class="logo"><div class="logo-mark">F</div><span>FORGE</span></div>`+
    NAV.map(([sec,items])=>`<div class="nav-sec">${sec}</div>`+
      items.map(([id,ic,lbl])=>`<div class="nav-item ${S.screen===id?"on":""}" onclick="go('${id}')"><span class="ic">${ic}</span>${lbl}</div>`).join("")).join("")+
    `<div class="side-user"><div class="avatar">SC</div><div><div style="font-size:12.5px">${D.user.name}</div>
     <div style="font-size:10px;color:var(--muted)">Lv ${D.user.level} · 🔥 ${D.user.streak}-day streak</div></div></div>`;
  document.getElementById("dock").innerHTML=DOCK.map(([id,ic,lbl])=>
    `<div class="d ${S.screen===id?"on":""} ${id==="coach"?"coach":""}" onclick="go('${id}')"><span class="di">${ic}</span>${lbl}</div>`).join("");
  document.getElementById("view").innerHTML=`<div class="fade">${SCREENS[S.screen]()}</div>`;
}
render();
</script>
